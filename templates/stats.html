<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Private Stats Dashboard</title>
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='stats.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.33.0.min.js"></script>
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="{{ url_for('static', filename='stats-theme.js') }}"></script>
  <script defer src="{{ url_for('static', filename='stats-charts.js') }}"></script>
</head>
<body class="stats-body">
  <div class="stats-glow glow-a"></div>
  <div class="stats-glow glow-b"></div>

  <main class="stats-wrap">
    <header class="stats-header panel">
      <div>
        <p class="badge">Private dashboard</p>
        <h1>Weekly Rhythm Tracker</h1>
        <p class="muted">{{ dashboard.coverage }}</p>
      </div>
      <div class="session-actions">
        <button
          id="theme-toggle"
          type="button"
          class="ghost-link"
          data-dark-label="Dark mode"
          data-light-label="Light mode"
        >
          Dark mode
        </button>
        <a class="ghost-link" href="{{ url_for('private_nav') }}">Private Nav</a>
        <a class="ghost-link" href="{{ url_for('passkey_management') }}">Passkeys</a>
        <a class="ghost-link" href="{{ url_for('stats_import_page') }}">Import Data</a>
        <a class="ghost-link" href="{{ url_for('home') }}">Back to Portfolio</a>
        <form method="post" action="{{ url_for('stats_logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button type="submit" class="lock-button">Lock</button>
        </form>
      </div>
    </header>

    <section id="stats-dashboard">
      {% include "partials/stats_dashboard.html" %}
    </section>
  </main>
</body>
</html>
