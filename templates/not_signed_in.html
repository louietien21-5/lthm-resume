<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not Signed In</title>
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='stats.css') }}">
  <script defer src="{{ url_for('static', filename='stats-theme.js') }}"></script>
</head>
<body class="stats-body login-body">
  <main class="login-wrap panel">
    <p class="badge">Restricted access</p>
    <h1>Not signed in</h1>
    {% if login_link_available %}
    <p class="muted">This page is private. Sign in to continue.</p>
    {% else %}
    <p class="muted">This page is private. You need the private login URL to continue.</p>
    {% endif %}

    <div class="login-actions">
      {% if login_link_available %}
      <a class="ghost-link" href="{{ secret_login_url }}">Sign in</a>
      {% endif %}
      <a class="ghost-link" href="{{ url_for('home') }}">Back to Portfolio</a>
    </div>
  </main>
</body>
</html>
